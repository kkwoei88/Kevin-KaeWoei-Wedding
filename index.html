<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin & Kae Woei Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#efe6d8;
font-family:"Playfair Display",serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.card{
background:#f5efe6;
width:420px;
padding:60px 40px;
text-align:center;
border:1px solid #d8cfc2;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.names{
font-family:"Great Vibes",cursive;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:16px;
margin-bottom:40px;
letter-spacing:1px;
}

.lang-buttons a{
display:block;
margin:15px auto;
padding:12px 20px;
border:1px solid #3b2f2f;
width:200px;
text-decoration:none;
color:#3b2f2f;
font-size:16px;
transition:all 0.3s ease;
}

.lang-buttons a:hover{
background:#3b2f2f;
color:#f5efe6;
}

.divider{
width:60px;
height:1px;
background:#c7b8a3;
margin:25px auto;
}

.logo{
margin-top:40px;
opacity:0.8;
}

.logo img{
width:90px;
}

</style>
</head>

<body>

<div class="card">

<div class="names">Kevin & Kae Woei</div>
<div class="subtitle">Wedding Invitation</div>

<div class="divider"></div>

<div class="lang-buttons">

<a href="en.html">English Invitation</a>

<a href="zh.html" style="font-family:'Noto Serif SC',serif;">
中文邀请函
</a>

</div>

<div class="logo">
<img src="eo-logo.png" alt="Eastern & Oriental Hotel">
</div>

</div>

</body>
</html>
